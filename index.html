<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upstate NY Trip · May 2025</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">🏔️</span>
        <div>
          <h1>Upstate NY</h1>
          <p>May 8–10, 2025</p>
        </div>
      </div>
      <div class="user-picker">
        <label for="userSelect">You are:</label>
        <select id="userSelect">
          <option value="">— select —</option>
        </select>
      </div>
    </div>
  </header>

  <!-- ─── Tab Nav ─────────────────────────────────────────────────────────── -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="trip">🗺️ Trip Plans</button>
    <button class="tab-btn"        data-tab="bracket">🏠 AirBnb Vote</button>
    <button class="tab-btn"        data-tab="expenses">💰 Expenses</button>
  </nav>

  <!-- ─── Main ────────────────────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- TRIP TAB -->
    <section id="tab-trip" class="tab-pane active">
      <div class="section-header">
        <h2>Itinerary</h2>
        <button class="btn btn-primary" id="addEventBtn">+ Add Event</button>
      </div>
      <div id="itinerary-container"></div>
    </section>

    <!-- BRACKET TAB -->
    <section id="tab-bracket" class="tab-pane">
      <div id="bracket-view"></div>
    </section>

    <!-- EXPENSES TAB -->
    <section id="tab-expenses" class="tab-pane">
      <div class="section-header">
        <h2>Expenses</h2>
        <button class="btn btn-primary" id="addExpenseBtn">+ Add Expense</button>
      </div>
      <div id="expensesSummary"></div>
      <div id="expensesList"></div>
    </section>

  </main>

  <!-- ─── Add Event Modal ──────────────────────────────────────────────────── -->
  <div class="modal hidden" id="addEventModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3>Add Event</h3>
      <form id="addEventForm" autocomplete="off">
        <div class="form-group">
          <label>Day</label>
          <select name="date" required>
            <option value="2025-05-08">Thursday, May 8</option>
            <option value="2025-05-09">Friday, May 9</option>
            <option value="2025-05-10">Saturday, May 10</option>
          </select>
        </div>
        <div class="form-group">
          <label>Time <span class="optional">(optional)</span></label>
          <input type="time" name="time">
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" required placeholder="e.g. Arrive at AirBnb">
        </div>
        <div class="form-group">
          <label>Notes <span class="optional">(optional)</span></label>
          <textarea name="description" rows="3" placeholder="Any details…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelEventBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Add Expense Modal ────────────────────────────────────────────────── -->
  <div class="modal hidden" id="addExpenseModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3>Add Expense</h3>
      <form id="addExpenseForm" autocomplete="off">
        <div class="form-group">
          <label>Description</label>
          <input type="text" name="description" required placeholder="e.g. Groceries">
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" name="amount" step="0.01" min="0.01" required placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Paid by</label>
          <select name="paidBy" required id="paidBySelect"></select>
        </div>
        <div class="form-group">
          <label>Split among</label>
          <div class="checkbox-group" id="splitAmongGroup"></div>
          <div class="split-shortcuts">
            <button type="button" class="btn btn-sm btn-ghost" id="selectAllBtn">All</button>
            <button type="button" class="btn btn-sm btn-ghost" id="selectNoneBtn">None</button>
          </div>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="date">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelExpenseBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Toast ────────────────────────────────────────────────────────────── -->
  <div class="toast toast-hidden" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
